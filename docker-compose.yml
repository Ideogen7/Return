# =============================================================================
# Return — Docker Compose (Development)
# =============================================================================
# Usage: docker compose up
# All services start with hot reload enabled.
# =============================================================================

services:
  postgres:
    image: postgres:17
    container_name: return-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    container_name: return-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: return-backend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: '3000'
      API_PREFIX: v1
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 30d
      LOG_LEVEL: debug
      CORS_ORIGIN: http://localhost:8081
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./backend/prisma.config.ts:/app/prisma.config.ts
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  prism:
    image: stoplight/prism:4
    container_name: return-prism
    restart: unless-stopped
    ports:
      - '4010:4010'
    volumes:
      - ./docs/openapi.yaml:/tmp/openapi.yaml:ro
    command: mock /tmp/openapi.yaml --host 0.0.0.0 --port 4010 --cors

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: return-frontend
    restart: unless-stopped
    ports:
      - '8081:8081'
    environment:
      BROWSER: 'none'
      CHOKIDAR_USEPOLLING: 'true'
      WATCHPACK_POLLING: 'true'
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/assets:/app/assets
      - ./frontend/__mocks__:/app/__mocks__
    depends_on:
      backend:
        condition: service_healthy
      prism:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
